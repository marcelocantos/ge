    - 'Android: GeActivity overrides onTrimMemory(int level); the engine maps TRIM_MEMORY_RUNNING_MODERATE to Low, TRIM_MEMORY_RUNNING_LOW + TRIM_MEMORY_BACKGROUND to Moderate, TRIM_MEMORY_RUNNING_CRITICAL + TRIM_MEMORY_COMPLETE to Critical'
    - 'iOS: SessionHost subscribes to UIApplicationDidReceiveMemoryWarningNotification and forwards as Critical (iOS doesn''t grade pressure); also forwards on applicationWillTerminate'
    - Engine drops its own caches first (texture mip cache, audio decoder buffers, font glyph atlas) before invoking the game callback, so the game can assume engine-internal slack is gone by the time it sees the warning
    - Documented in CLAUDE.md alongside the existing lifecycle handling
    - tiltbuggy or another sample logs the level on receipt to verify wiring (no real cache to drop in tiltbuggy)
    context: Mobile platforms send graded memory-pressure signals before killing apps; games with non-trivial asset caches (texture atlases, mip pyramids, audio buffers) should drop their own caches when warned rather than getting OOM-killed. iOS sends a single boolean warning via UIApplicationDidReceiveMemoryWarningNotification; Android grades pressure in five levels via onTrimMemory(int). Surfacing both as a unified Low/Moderate/Critical enum keeps games from caring about which platform they're on while still letting them be more aggressive on Critical than Low. The engine drops its own caches first because it knows what's safe to drop; the game callback fires after engine cleanup so the game's response is layered on top of whatever the engine already freed.
