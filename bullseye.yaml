    - Documented in ge/CLAUDE.md under the rendering / layout API section
    context: |-
      Discovered 2026-05-10 by an audit of multimaze for general-purpose logic that belongs in ge. Multimaze has *three* separately-written orthographic projection builders solving the same problem: fit content of fixed aspect ratio (e.g. 320×480 maze, 1024×768 menu) into the available screen rect with letterbox/pillarbox borders, plus a pixel-space variant for chrome layout. Each builder also has a paired screen-to-content unprojection (multimaze's `screenToMenuCoords` at `Application.cpp:561-592`) for routing taps back into the content space, also reinvented per call site.

      The math is the same every time: `M = T(content_origin_in_screen) * S(uniform_scale)` where `uniform_scale = min(screen.w / content.w, screen.h / content.h)` and `content_origin_in_screen = (screen - scaled_content) / 2`. Three call sites means three opportunities to get sign conventions wrong.

      Pairing the forward + inverse in one header is important: hit testing under a letterboxed projection is the natural follow-up to rendering under one, and they need to agree on conventions byte-for-byte.

      The wider context is the multimaze→ge audit (see also T54-T58 series and 🎯T53). The principle: multimaze keeps only logic that's specifically tied to its game (level parsing, physics tuning, color enum, etc.); everything reusable lives in ge.</context>
