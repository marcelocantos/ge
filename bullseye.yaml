  T14:
    name: Render subsystem visibly tilts the viewport in response to synthesised accelerometer input
    status: achieved
    value: 3.0
    cost: 3.0
    acceptance:
    - When synthesised accelerometer input is non-zero, the rendered viewport is visibly tilted in 3D (perspective quad transform matching the tilt angles)
    - Works in direct mode (render-to-texture → composite) and player mode (decoded H.264 texture presented on tilted quad)
    - Zero tilt produces pixel-exact identity presentation (no regression for static content)
    - No game-code changes — purely a render-subsystem effect
    context: |-
      On a real device, a tilt-driven game's screen tilts naturally with the physical device. On desktop/simulator/emulator where the accelerometer is synthesised (⌥WASD or ⌥-mouse), there's no physical tilt cue — the user only sees the game's reaction to the simulated gravity. Making the viewport itself visibly tilt mimics the real experience and makes the synthesis mechanism immediately intuitive.

      Implementation: after the game renders, the render subsystem composites the final image onto a quad in 3D space rotated by the current synthesised tilt. In direct mode this means adding an intermediate render-to-texture pass. In player mode the decoded H.264 texture is presented on a tilted quad instead of blitted straight.

      Concerns:
      - Extra RTT pass in direct mode adds cost (negligible for phone-class content).
      - 2D orthographic games will show perspective distortion at the viewport edges when tilted. That's arguably a feature — it IS being tilted.
      - Pure UI or menu screens may look jarring; games that want a static view while in menus should toggle the effect off (it's implicitly off when tilt input is zero — the identity transform).

      Depends on 🎯T12 (synthesis plumbing) being in place first.
