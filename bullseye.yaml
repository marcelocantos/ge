  T56:
    name: ge::transform offers matrix builders for centered + rotated 2D placements; SpriteBatch absorbs MeshBuilder's role
    status: achieved
    value: 0.0
    cost: 0.0
    acceptance:
    - '`ge::frameCentered(la::float2 center, la::float2 size) -> la::float4x4` returns a model-to-world matrix mapping the unit square (0..1)² to a rect centered at `center` with `size`. Companion to existing `ge::frame(Rect)`.'
    - '`ge::frameRotated(la::float2 center, la::float2 size, float angle) -> la::float4x4` — same, plus rotation by `angle` radians around `center` (positive = standard 2D math convention).'
    - '`frameCentered` is `constexpr`; `frameRotated` follows ge''s existing convention (uses `std::sin/cos`, so non-constexpr until C++26 — mirrors `DampedRotation::matrix()`). Both available via existing `#include <ge/transform.h>`.'
    - Tests verify (a) the unit-square corner positions match expected geometry, (b) `frameCentered` matches `frame(Rect::centered(c, s))` exactly, (c) `frameRotated(c, s, 0)` matches `frameCentered(c, s)`, (d) `frameRotated(c, s, π/2)` produces the expected 90° rotation, (e) round-trip via `la::inverse` recovers a unit-square point.
    - multimaze's `MeshBuilder.h` is *deleted*. `addQuad(rect, uv, color)` migrates to `batch.addSprite(ge::frame(rect), sprite, uv, abgr(color))`. `addSprite(center, size, uv, color)` migrates to `batch.addSprite(ge::frameCentered(c, s), sprite, uv, abgr(color))`. `addRotatedSprite(center, size, angle, uv, color)` migrates to `batch.addSprite(ge::frameRotated(c, s, a), sprite, uv, abgr(color))`.
    - All multimaze call sites that previously held a `MeshBuilder` + `submitMesh` pair use `ge::SpriteBatch` directly.
    - Documented in ge/CLAUDE.md alongside `ge::frame(Rect)` in the existing 'Sprites, transforms, and SVG' section.
    context: |-
      Discovered 2026-05-10 by the multimaze→ge audit. Multimaze ships its own `MeshBuilder` class (`src/MeshBuilder.h`) for CPU-side quad accumulation: three convenience entry points (`addQuad`, `addSprite`, `addRotatedSprite`) writing into a `vector<SpriteVertex> + vector<uint32_t>` pair, flushed via `submitMesh(mb, view, prog, sampler, tex, state)`.

      ge already has the same capability via `ge::SpriteBatch`: `addSprite(modelToWorld, sprite, [uvSubRect], color)` queues a quad transformed by an arbitrary 4×4 matrix, batches per (texture, view), submits via transient buffers. The functional gap is purely **ergonomic** — multimaze's three convenience overloads collapse to one matrix-based call in ge, but the rotated-sprite case requires composing translate * rotate * scale matrices manually (verbose).

      Plan A from the design discussion (2026-05-10): close the gap via matrix-builder helpers in `ge::transform` rather than convenience overloads on `SpriteBatch`. Keeps `SpriteBatch` minimal and the rotation/centering math reusable for non-sprite contexts (lines, SVG transforms, etc.). Existing `ge::frame(Rect)` already covers the axis-aligned rect case; `frameCentered` and `frameRotated` complete the trio.

      The user's principle (2026-05-10): keep multimaze game-specific logic small. After this target retires, multimaze deletes `MeshBuilder.h` + `MeshBuilder.cpp` (or whatever the impl file is) and migrates every call site to `SpriteBatch` + a `frameXXX` helper.

      Part of the multimaze→ge audit lift series alongside 🎯T54, T55, T57, T58.
    tags:
