  T12:
    name: ge's render subsystem synthesises ⌥WASD accelerometer events uniformly across all host contexts
    status: identified
    value: 5.0
    cost: 5.0
    acceptance:
    - ⌥WASD synthesis code lives in a single ge translation unit, called from both player_core.cpp and ge's direct-mode render path
    - 'Runs correctly in: desktop player, iOS simulator (player & distribution), Android emulator (player & distribution)'
    - Tilt-driven game (e.g. tiltbuggy) compiled as a distribution build runs on the iOS simulator and responds to ⌥WASD exactly as it does against the desktop player
    - Engine-side code is unchanged — games only ever handle SDL_EVENT_SENSOR_UPDATE
    context: |-
      ge has two logical subsystems: render (pixels + input) and engine (game logic). In player scenarios they live in separate processes bridged by ged; in distribution builds they live in the same process with the wire short-circuited. In all cases the engine subsystem should only see SDL_EVENT_SENSOR_UPDATE — it does not know or care whether the sensor is real hardware or synthesised.

      Currently ⌥WASD synthesis is implemented inline in tools/player_core.cpp (desktop player, iOS simulator, Android emulator running player). It's NOT implemented in the in-process render subsystem used by distribution builds, so a tilt-driven game compiled as a standalone iOS/Android app running on a simulator/emulator gets no input.

      Fix: extract the synthesis logic (detect-no-accel + keyboard-to-SDL_EVENT_SENSOR_UPDATE + orientation rotation) into a reusable ge helper, and invoke it from every render-subsystem host: player_core.cpp AND ge's direct-mode render path. "No accelerometer" detection should be programmatic — SDL sensor enumeration plus runtime platform check for simulator/emulator.
    origin: discovered during 🎯T10 tiltbuggy work when writing main.cpp input handling
    discovered: 2026-04-16
  T13:
    name: ⌥-gated mouse movement simulates accelerometer (replaces or supplements ⌥WASD)
    status: identified
    value: 3.0
    cost: 2.0
    acceptance:
    - Holding ⌥ and moving the mouse inside the ge window produces SDL_EVENT_SENSOR_UPDATE events with sensor data proportional to mouse position relative to window centre
    - Releasing ⌥ zeros the tilt
    - Works in the desktop player and in DirectRenderHost (distribution mode)
    - Game code is unchanged — only the render subsystem is affected
    context: |-
      ⌥WASD gives 8-direction quantised tilt — fine for directional input but a poor analog of a real accelerometer. ⌥-gated mouse gives a continuous 2D signal that directly mirrors device tilt: position within the window = tilt magnitude and direction (centre = neutral, edge = max). Natural dead-zone at centre, no chording for diagonals, feels intuitive (hold a modifier and "tilt" by aiming).

      Position-based, not delta-based — no cursor drift, no re-centre needed, matches the "where is the device tilted right now" model.

      Implementation: when ⌥ is held, sample mouse position each frame; emit SDL_EVENT_SENSOR_UPDATE with axes = (mouseX − windowCentreX) / scale and (mouseY − windowCentreY) / scale, capped at ±1.0 × g. When ⌥ is released, emit one final event with (0, 0) and stop sampling.

      Lives in the render subsystem (alongside the ⌥WASD synthesis or replacing it), in both the desktop player and DirectRenderHost. Game code unchanged — still just sees SDL_EVENT_SENSOR_UPDATE.
    depends_on:
    - T12
    origin: user suggestion during tiltbuggy architecture validation
    discovered: 2026-04-16
  T14:
    name: Render subsystem visibly tilts the viewport in response to synthesised accelerometer input
    status: identified
    value: 3.0
    cost: 3.0
    acceptance:
    - When synthesised accelerometer input is non-zero, the rendered viewport is visibly tilted in 3D (perspective quad transform matching the tilt angles)
    - Works in direct mode (render-to-texture → composite) and player mode (decoded H.264 texture presented on tilted quad)
    - Zero tilt produces pixel-exact identity presentation (no regression for static content)
    - No game-code changes — purely a render-subsystem effect
    context: |-
      On a real device, a tilt-driven game's screen tilts naturally with the physical device. On desktop/simulator/emulator where the accelerometer is synthesised (⌥WASD or ⌥-mouse), there's no physical tilt cue — the user only sees the game's reaction to the simulated gravity. Making the viewport itself visibly tilt mimics the real experience and makes the synthesis mechanism immediately intuitive.

      Implementation: after the game renders, the render subsystem composites the final image onto a quad in 3D space rotated by the current synthesised tilt. In direct mode this means adding an intermediate render-to-texture pass. In player mode the decoded H.264 texture is presented on a tilted quad instead of blitted straight.

      Concerns:
      - Extra RTT pass in direct mode adds cost (negligible for phone-class content).
      - 2D orthographic games will show perspective distortion at the viewport edges when tilted. That's arguably a feature — it IS being tilted.
      - Pure UI or menu screens may look jarring; games that want a static view while in menus should toggle the effect off (it's implicitly off when tilt input is zero — the identity transform).

      Depends on 🎯T12 (synthesis plumbing) being in place first.
    depends_on:
    - T12
    origin: user suggestion during tiltbuggy architecture validation
    discovered: 2026-04-16
  T15:
    name: Player binary restructured around named PlayerWireBridge + PlayerRender classes
    status: achieved
    value: 3.0
    cost: 5.0
    acceptance:
    - tools/player_core.cpp is gone (or reduced to a thin shim)
    - src/bridge/PlayerWireBridge.{h,cpp} exists, exposing typed wire operations symmetric to ServerWireBridge
    - Player binary uses AccelSynth from src/render/ rather than duplicating the synthesis code
    - Player + tiltbuggy --brokered round-trip still works
    context: |-
      tools/player_core.cpp is currently a single 605-line `playerCore()` function that mixes wire transport (WebSocket connection, SessionConfig RX, DeviceInfo TX, SDL event TX, H.264 RX) with local rendering (SDL window, SDL_Renderer, SDL_Texture, decoder, AVCC parser, present loop) and ⌥-mouse synthesis (now duplicated against the AccelSynth helper in the engine binary).

      Refactor into:
      - src/bridge/PlayerWireBridge.{h,cpp} — owns WsConnection, exposes typed helpers (sendSdlEvent, sendDeviceInfo, waitForSessionConfig, onVideoFrame, pumpWire). Symmetric to ServerWireBridge.
      - tools/PlayerRender.{h,cpp} or similar — owns SDL window + SDL_Renderer + SDL_Texture + decoder + AccelSynth + main loop. Consumes a PlayerWireBridge.
      - tools/player.cpp — main(): build PlayerRender + PlayerWireBridge, wire them together, run.

      Lets us delete the duplicated ⌥-mouse synthesis code (use AccelSynth from src/render/) and gives the player binary the same architectural clarity as the engine.
    origin: 'deferred from PR #11 (subsystem split)'
    discovered: 2026-04-16
