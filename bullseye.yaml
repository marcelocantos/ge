  T35:
    name: ge has a single CMake-driven build path; Module.mk and the hand-rolled iOS template retire
    status: identified
    value: 0.0
    cost: 0.0
    acceptance:
    - Top-level `CMakeLists.txt` is the single source of truth for ge's source lists, compile flags, and link line
    - '`Module.mk` is removed from the tree; README and CLAUDE.md no longer reference it'
    - Sample apps (`sample/tiltbuggy`, `sample/tiltcal`) build via `cmake -B build && cmake --build build` (or a thin Makefile wrapper); their old hand-written Makefiles are gone or reduced to wrappers
    - iOS template (`tools/ios-template/CMakeLists.txt.in`) consumes ge via `add_subdirectory(ge)` like the Android template, instead of listing GE_SOURCES directly
    - An engine-side change that adds a new source file or compile flag requires editing exactly one place to land on macOS desktop + Android + iOS
    - 'Direct-edit escape hatch documented in CLAUDE.md: how to invoke a one-off compile command, inspect generated build commands, add a non-CMake test target'
    context: |-
      ge currently maintains three different ways for apps to integrate the engine:

      1. `Module.mk` — Makefile include, used by macOS/Linux desktop apps. Hand-listed source files, hand-written compile/link rules, hand-managed include flags.
      2. `CMakeLists.txt` (top-level) — `add_subdirectory(ge)` integration, used by the Android template (post-T30.3 / PR #36). Same engine sources listed independently here.
      3. `tools/ios-template/CMakeLists.txt.in` — hand-rolled iOS bundle build that lists ge sources directly without going through either path 1 or 2.

      The same source-list information lives in three places. Drift between them has caused multiple bugs in v0.1.0 → v0.2.0:
      - T30.x dual-shader compile rules required parallel updates in Module.mk, CMakeLists.txt, and the iOS template.
      - The Android renderer flag changes (Vulkan + GLES, MULTITHREADED=0, GLESv2 → GLESv3) had to land in two separate CMake stanzas after the post-T30.3 restructure.
      - v0.2.0 shipped with `playerForceOrientation` undefined in libge — DirectRenderHost::send calls it but the stub was missing from both Module.mk and the top-level CMake. Fixed in PR #49 for v0.3.0; required edits in both build paths.

      Each engine-side change has a "did you remember to update all three?" tax that's already cost development time on multiple occasions.

      Resolution: unify on CMake. Make ge's top-level `CMakeLists.txt` the single source of truth for sources, flags, and link line. Convert sample apps' Makefiles into thin CMake wrappers (or their own small CMakeLists.txt). Convert the iOS template from hand-rolled GE_SOURCES to `add_subdirectory(ge)` like the Android template. Retire `Module.mk`.

      The user-side cost is small: each consuming game's Makefile becomes a 2-line wrapper around `cmake -B build && cmake --build build`, or a small CMakeLists.txt. The engine-side benefit is one canonical source list / flag list per platform-conditional section.

      User reservations (acknowledged 2026-05-02): "I'm just uneasy about relinquishing control to a controlled build system. Plus, I haven't had particularly good experiences using CMake in the past, but if it's the path of least resistance, I'm okay with it." Adopt modern (3.20+) CMake idiom: target-based, no `file(GLOB)`, no `find_package` for vendored deps. Document escape hatches (direct compile commands, `cmake --build -v`).

      Constraint that makes pure-Module.mk untenable: Android's Gradle requires CMake or ndk-build to drive the native build. There is no externalNativeBuild type for Make. ge would need at minimum a CMakeLists.txt shim invoked by Gradle even if Module.mk stayed authoritative — and that shim would have to duplicate the source list anyway. So the choice is "CMake everywhere as the canonical path" vs "Module.mk + a CMake shim that mirrors it" — the former is one source of truth, the latter is two.

      Trigger for re-prioritising: each future bug caused by source-list drift is evidence the tax is biting. If a few weeks pass without drift causing a problem, defer further. The release skill's discover.sh and homebrew-tap status checks remain orthogonal.
    origin: filed-during-v0.3.0-prep — surfaced repeatedly during v0.1.0 → v0.2.0 development as the same kind of bug kept hitting the same source-list-drift problem
    discovered: 2026-05-02
  T36:
    name: SessionConfig.orientation API matches its behaviour — either authoritative per-orientation lock or a clean boolean
    status: identified
    value: 0.0
    cost: 0.0
    acceptance:
    - 'Either: SessionConfig.orientation is renamed/repurposed as a boolean (option 1), or: passing different kOrientation* constants produces different runtime behaviour (option 2)'
    - The API surface in Protocol.h matches what the implementation does — no constant in the enum is silently equivalent to another
    - TiltBuggy and any other consuming app declare their orientation intent in one place that's actually authoritative
    - iOS direct-render apps work correctly when the user wants exactly one specific orientation that the plist alone can't enforce (e.g., 'LandscapeLeft only, even if device is held in LandscapeRight at launch')
    - v0.4.0 docs (CLAUDE.md, README, agents-guide, Protocol.h comment) get updated again to drop the 'specific value reserved for future use' caveat once the API is honest
    context: |-
      The orientation-lock API surface is misleading as of v0.3.0:

      The header in `include/ge/Protocol.h` defines four specific constants:

          constexpr uint8_t kOrientationLandscape        = SDL_ORIENTATION_LANDSCAPE;
          constexpr uint8_t kOrientationLandscapeFlipped = SDL_ORIENTATION_LANDSCAPE_FLIPPED;
          constexpr uint8_t kOrientationPortrait         = SDL_ORIENTATION_PORTRAIT;
          constexpr uint8_t kOrientationPortraitFlipped  = SDL_ORIENTATION_PORTRAIT_FLIPPED;

      …suggesting per-orientation lock control. But `playerForceOrientation()` in `tools/player_orientation_ios.mm` only branches on 0-vs-non-0:

          void playerForceOrientation(uint8_t orientation) {
              if (orientation == 0) return;
              g_orientationLocked = YES;
              …
          }

      The actual orientation that gets locked is whatever iOS chose at launch, bounded by `UISupportedInterfaceOrientations` in `Info.plist` — never by the constant value. So `kOrientationLandscape` and `kOrientationLandscapeFlipped` are functionally identical inputs at runtime.

      A game dev passing `wire::kOrientationLandscape` expecting "lock to LandscapeLeft regardless of how the user is holding the device" gets "lock to whatever iOS picked, which the plist's allowed set decides." That mismatch will cost time the next time someone integrates ge for a portrait-or-landscape-specific app.

      Three design options were discussed (2026-05-02) and the user deferred to keep release momentum, choosing to ship v0.4.0 as a doc-only update describing current behaviour:

      1. **Collapse to boolean.** Rename `SessionConfig.orientation` → `SessionConfig.lockOrientation` (bool). Plist owns the "which orientation" axis. Honest, simple. Loses the option to add per-orientation lock without an API break.

      2. **Make the constant authoritative.** When the engine sees `kOrientationLandscape`, it programmatically narrows `supportedInterfaceOrientations` to `{LandscapeLeft, LandscapeRight}` via swizzling that property too, regardless of Info.plist. Plist becomes the *fallback*. Fully expressive; adds a runtime override of a launch-time decision.

      3. **Document and live with it.** Currently shipped path (v0.4.0).

      The trigger for picking between #1 and #2: a game wants per-orientation-only lock that the plist alone can't easily express (e.g., "lock to LandscapeLeft, never LandscapeRight, never adapt to device flip mid-play"). At that point, #2 is the right choice. Until then, #1 is honesty.

      Constraint to remember: the only iPad orientation-lock mechanism that survives iPadOS 26 multitasking is the `prefersInterfaceOrientationLocked` swizzle (Apple TN3192). Both options have to keep using it; only the input shape changes.
    origin: filed-during-v0.4.0-prep — surfaced when user asked 'do we allow setting any landscape or a specific landscape or both?' and the honest answer was 'the API suggests per-orientation control but the implementation treats the field as a boolean'
    discovered: 2026-05-02
  T37:
    name: Direct-mode apps can read safe-area insets from ge::Context to avoid camera/notch/Dynamic Island chrome
    status: identified
    value: 0.0
    cost: 0.0
    showcase: true
    acceptance:
    - ge::Context exposes a safe-area accessor (e.g. SafeAreaInsets safeArea() const) returning per-edge pixel insets in the current orientation; on desktop all four insets are 0
    - DirectRenderHost (headless=false path) keeps the Context's safe-area in sync by querying the platform (UIWindow.safeAreaInsets on iOS, WindowInsets/SDL3 accessor on Android) at the same trigger points where width()/height() update — initial layout, resize, rotation
    - An app that lays out a top bar at safeArea().top (and a bottom HUD at safeArea().bottom) renders clear of the camera/notch/Dynamic Island and home-indicator on iPad mini A17 Pro and modern iPhones; reproduced via multimaze2 or an equivalent ge sample
    - 'Wire-mode parity is preserved: brokered (player) sessions continue to receive wire::SafeAreaUpdate; direct-mode and wire-mode apps observe the same safeArea() shape via Context (no app code branches on mode)'
    - include/ge/ public API and CLAUDE.md's 'Public API' / 'Server/player architecture' sections document the new accessor and the rule that direct-mode and wire-mode apps consume insets identically
    - RunConfig ABI is not broken — the accessor lives on Context, not as a new onRender argument (the alternative considered in the originating issue)
    context: |-
      Migrated from https://github.com/squz/ge/issues/57 (filed 2026-05-03 by marcelocantos).

      Apps using ge::run with headless=false (DirectRenderHost) currently have no programmatic way to read the device's safe-area insets — the regions occupied by camera notch, Dynamic Island, system gestures, home indicator, etc. The existing wire::SafeAreaUpdate is part of the brokered (player) wire protocol and isn't surfaced to in-process apps.

      Concrete trigger: multimaze2 is hitting this on iPad mini A17 Pro and modern iPhones — its top bar pins to the physical screen top and gets covered by camera / status indicators. Not fixable on the consumer side; this is a ge gap.

      Proposal (from the issue):
      - Add a SafeAreaInsets struct with top/bottom/left/right (pixels, current orientation).
      - Expose Context::safeArea() returning the current insets.
      - DirectRenderHost updates the value from UIWindow's safeAreaInsets on Apple, Android WindowInsetsCompat (or SDL3's existing safe-area accessor) on Android. Update points are the same as width()/height() — initial layout, resize, rotation.
      - Desktop returns all-zero.

      Alternative considered and rejected (per the issue): adding SafeAreaInsets to RunConfig::onRender(int w, int h, SafeAreaInsets sa). Cleaner at the call site but is a RunConfig ABI break for every existing consumer; not worth it.

      Affected files:
      - src/render/DirectRenderHost.mm — query SDL window's safe area on Apple; post changes into Context.
      - src/Context.cpp (or wherever the platform context is owned) — expose the getter, plumb the storage.
      - Android: WindowInsetsCompat via a JNI bridge or SDL3's safe-area accessor.

