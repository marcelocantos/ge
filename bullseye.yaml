  T57:
    name: ge offers an SDL_Surface to premultiplied-RGBA8 bgfx Sprite helper
    status: achieved
    value: 0.0
    cost: 0.0
    acceptance:
    - '`ge::imageFromSurface(SDL_Surface*) -> Sprite` (or similarly-named API in `<ge/png.h>` next to existing `loadImage`) accepts an in-memory SDL_Surface, premultiplies alpha, uploads as a bgfx RGBA8 texture, and returns a `Sprite{tex, width, height}`'
    - Behaviour matches the existing `ge::loadImage(path)` premultiplication contract — same RGBA8 byte order, same premul convention, same caller-owns-texture lifetime
    - Handles non-RGBA input formats by converting via SDL_ConvertSurface to RGBA8 first; if conversion fails, returns a null Sprite with a `SPDLOG_ERROR` (matches `loadImage`'s failure mode — *not* a throw, since this isn't a system-resource lookup like `resolveFont`)
    - Tests cover (a) RGBA8 input is uploaded as-is with premul applied, (b) non-RGBA input gets converted then premul'd, (c) null/empty surface returns null Sprite without crashing
    - multimaze's `Application.cpp:134-165` inline conversion is gone; the call site uses `ge::imageFromSurface`
    - Documented in ge/CLAUDE.md alongside `ge::loadImage`
    context: |-
      Discovered 2026-05-10 by the multimaze→ge audit. Multimaze has an inline `Application.cpp:134-165` block that takes an `SDL_Surface*` (typically obtained from somewhere other than a file path — e.g. an SVG rasterized in-process, an embedded asset decoded at runtime, a procedurally-generated bitmap), premultiplies its alpha channel, and uploads as a bgfx RGBA8 texture. The math is identical to what `ge::loadImage(path)` does after `IMG_Load_IO`, but `loadImage` only exposes the path-based entry point.

      Lifting the post-load half of `loadImage` into a Surface-accepting helper (a) eliminates the multimaze duplicate, (b) opens up other future use cases (procedural textures, SVG-rasterizer output before it goes through `ge::renderSvgDocument`, image data fetched over the wire), and (c) lets `loadImage` itself reduce to "openFile + IMG_Load_IO + imageFromSurface" — a small refactor that improves layering.

      Failure mode is `null Sprite + SPDLOG_ERROR`, matching `loadImage`'s convention rather than the new throwing contract from `resolveFont` (v0.21.0). Rationale: `imageFromSurface` failures are usually programmer errors with the surface object (null pointer, unsupported format), not user-visible "system asset is missing" failures; the throw contract is calibrated for the latter case.

      Part of the multimaze→ge audit lift series alongside 🎯T54, T55, T56, T58.
