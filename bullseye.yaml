  T53:
    name: Hit testing on lunasvg-rendered UI supports fingertip tolerance
    status: identified
    value: 0.0
    cost: 0.0
    acceptance:
    - A consumer that drives interactive UI through a lunasvg::Document can hit-test taps with a tolerance radius (in pt or px) and get back the closest tappable element within that radius — not just the pixel-precise hit
    - The API integrates with lunasvg's existing element-selection semantics (clipPath, transforms, layered groups, z-order) — i.e. it doesn't reinvent the hit graph
    - Multimaze (the canonical consumer for SVG-driven UI) drops its rect-based `hitExpandPt` workaround in TopBar.cpp:160-176 and equivalents; tap targets are author-agnostic of fingertip-tolerance concerns
    - ge/CLAUDE.md documents the recommended approach (which of the implementation options below was taken) so consumers building SVG-driven UI know what to reach for
    - If implementation requires patching the vendored lunasvg, the patch is documented under ge/vendor/patches/ with a clear description of what it changes and why the upstream API shape didn't suffice
    context: |-
      Background. Today multimaze and other ge consumers do UI hit testing the manual way: maintain ge::Rect bounds for each tappable element, expand by `hitExpandPt` (4–8 pt typical) before doing point-in-rect, route to the right handler. The expansion is needed because raw pixel-precise hit-test on a finger-sized tap is too tight on high-DPI displays. Multimaze does this in `TopBar.cpp:160-176` (and equivalent code paths exist in any consumer with chrome).

      The plan. Multimaze is moving UI rendering to lunasvg::Document — buttons, bars, menus all become SVG elements with CSS-styled state. Hit testing should follow: instead of maintaining a parallel rect-bounds graph, ask lunasvg `elementFromPoint(x, y)` and use the returned element's id/class to route. This keeps the SVG as the single source of truth for layout and hit graph.

      The catch. lunasvg's `elementFromPoint` is pixel-precise — the public API takes one point, returns the topmost element under that exact pixel. There is no tolerance parameter. So a naïve migration *loses* fingertip tolerance: small SVG elements become harder to tap on dense displays.

      Implementation options (decided at execution time, not declared up-front):
      - (a) Author-side: wrap each tap target in a transparent `rect`/`circle` of the desired tap-region size in the SVG itself. Pros: zero engine work, fully expressive (per-target tolerances). Cons: relies on every SVG author remembering to do it; duplicates geometry; can perturb visual layout via z-order accidents.
      - (b) Caller-side N-point sampling: ge offers a free function that calls `elementFromPoint` at the centre + 4–8 surrounding points (a circle of `tolerancePx` radius), returns the most-frequently-hit interactive element, or the centre's hit if no consensus. Pros: lives entirely in ge, no upstream changes. Cons: O(N) cost per tap; tie-breaking is ad-hoc; "interactive" needs a marker convention (CSS class? data-attr?).
      - (c) Vendored patch: extend lunasvg's hit-test to honor a tolerance radius natively — plutovg already walks the geometry tree, can be taught to test against a circle of radius r instead of a single point. Pros: cleanest API, fastest, integrates correctly with z-order. Cons: patches a vendored upstream; needs to be re-applied on lunasvg version bumps; option to upstream.

      Discovered 2026-05-10 during a multimaze→ge audit conversation about lifting reusable logic. The user noted that hit testing is currently rect-based (the originally-feared lunasvg hit-test integration hasn't actually happened yet), but the migration plan stands and this concern will bite as soon as the first SVG-driven UI surface lands. File now so the implementation choice gets considered before someone reaches for the SVG-author workaround by reflex.
    tags:
    - api
    - lunasvg
    - hit-testing
    - ui
    - fingertip-tolerance
    origin: manual
    discovered: 2026-05-10
