    - 'Provider: Firebase Cloud Messaging on BOTH platforms. FCM forwards to APNs for iOS delivery, so the backend has one token type and one send-API to integrate against. Google dependency on iOS is acknowledged and acceptable for the studio''s use case'
    - 'Per-app credentials: apps ship google-services.json (Android, in app/) and configure APNs in their iOS bundle (entitlement + the FCM-provided APNs key registered in the Firebase console). Engine wiring does not embed any credentials'
    - 'Build system: tools/android-template/app/build.gradle.in pulls in Firebase BoM + firebase-messaging via a new dependencies block; tools/ios-template/Info.plist.in or the bundle config opts into UIBackgroundModes ''remote-notification'' and the aps-environment entitlement; init-android.sh warns when app/google-services.json is missing'
    - GeActivity registers a FirebaseMessagingService subclass (ge.GePushService); iOS adds an AppDelegate-equivalent extension to ge::SessionHost that registers for remote notifications and forwards token + payload events through ge::run
    - Background-delivered notifications display via the OS's standard UI without engine involvement — the engine is only on the path for foreground delivery + token plumbing
    - Documented in CLAUDE.md including the 'one-time consumer setup' steps (create Firebase project, drop google-services.json into app/, enable APNs in the Apple developer portal, paste the APNs key into Firebase)
    - 'Sample (tiltbuggy or a small new sample) demonstrates: registerForPush, log the token, log a foreground notification when one arrives via the Firebase console''s test-send'
    context: |-
      Push is the first feature in the "consumer apps need this universally but the platforms do it very differently" bucket where ge can land a real cross-platform abstraction rather than punting to per-app boilerplate.

      Provider choice: FCM-everywhere. The alternative — APNs direct on iOS, FCM on Android — would mean two SDKs, two backend integrations, and two token formats forever. FCM transparently routes to APNs for iOS (Firebase exchanges the APNs key in their console), so the studio's backend talks to one Google API for everyone. The Google dependency on iOS is real but tolerable for game shipping; not appropriate for privacy-focused / non-Google-aligned apps but that's not the studio's profile.

      Engine surface (proposed):
      - Context::registerForPush() — triggers permission ask (iOS UNUserNotificationCenter / Android POST_NOTIFICATIONS) and token acquisition.
      - RunConfig.onPushToken(std::string) — token delivery / rotation.
      - RunConfig.onPushReceived(const PushPayload&) — foreground delivery only; background notifications display through the OS without engine involvement.
      - PushPayload exposes the typed essentials (title, body, data dict) plus the raw provider payload for advanced consumers.

      Per-app credentials are still per-app: google-services.json in the Android app/, APNs entitlement + FCM-registered APNs key on iOS. Engine ships the wiring, app supplies the secrets — same pattern as any auth integration.

      Build-system impact is bigger than any other GeActivity hook so far: Firebase BoM + firebase-messaging in app/build.gradle.in (Android side); UIBackgroundModes + aps-environment entitlement in the iOS template (likely already partly there for any future push work); init-android.sh sanity-check for google-services.json.

      Out of scope for this target:
      - Local (non-push) notifications — separate target, simpler API.
      - Notification action buttons / categories — once the basics ship.
      - Rich media notifications (images, video) — once the basics ship.
      - Topic-based subscriptions / FCM channel API surface — exposed via the raw provider payload for now.

      Originated from a design discussion about which 'probably skip' Activity-level hooks were genuinely cross-platform-shaped and worth ge owning vs. leaving per-app. Push was the strongest candidate; in-app review may follow as a smaller sibling target if the studio adopts that flow.
